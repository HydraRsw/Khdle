<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kingdom Hearts Wordle</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>KHDle</h1>
      <p>¡Adivina el personaje de Kingdom Hearts de hoy!</p>
    </header>

    <main>
      <!-- Barra de búsqueda -->
   <div class="search-container">
    <div class="input-wrapper">
        <input type="text" id="guess-input" placeholder="Type character name..." autocomplete="off">
        <div id="autocomplete-list" class="autocomplete-items"></div>
    </div>
    <button id="guess-btn">Guess</button>
</div>

      <!-- Contenedor de las pistas (las cabeceras de las columnas) -->
      <div class="attributes-header">
        <div class="header-box">Character</div>
        <div class="header-box">Gender</div>
        <div class="header-box">Alignment</div>
        <div class="header-box">Weapon</div>
        <div class="header-box">Origin</div>
        <div class="header-box">Debut</div>
        <div class="header-box">Species</div>
      </div>
      
      <!-- Aquí se generarán las filas con las respuestas -->
      <div id="results-grid"></div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
